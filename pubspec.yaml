name: spk_magang
description: Sistem Pendukung Keputusan Pemilihan Tempat Magang - Metode MOORA
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client untuk consume API Laravel nanti
  http: ^1.2.0

  # Menyimpan token login secara persisten (agar user tidak perlu login ulang)
  shared_preferences: ^2.3.0

  # Ikon tambahan yang lebih kaya
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Untuk menggunakan font Poppins, tambahkan di sini.
  # Download font Poppins dari https://fonts.google.com/specimen/Poppins
  # lalu taruh di folder assets/fonts/
  #
fonts:
  - family: Poppins
    fonts:
      - asset: assets/fonts/Poppins-Regular.ttf
      - asset: assets/fonts/Poppins-Medium.ttf
        weight: 500
      - asset: assets/fonts/Poppins-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Poppins-Bold.ttf
        weight: 700
